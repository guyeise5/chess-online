{{- if .Values.openingInit.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "chess.fullname" . }}-opening-init
  labels:
    {{- include "chess.labels" . | nindent 4 }}
    app.kubernetes.io/component: opening-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.openingInit.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: opening-init
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: opening-init
          image: "{{ .Values.openingInit.image.repository }}:{{ .Values.openingInit.image.tag }}"
          imagePullPolicy: {{ .Values.openingInit.image.pullPolicy }}
          env:
            - name: MONGO_URI
              value: {{ include "chess.mongoUri" . | quote }}
          resources:
            {{- toYaml .Values.openingInit.resources | nindent 12 }}
{{- end }}

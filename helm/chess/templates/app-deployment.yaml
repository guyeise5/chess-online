apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chess.fullname" . }}-app
  labels:
    {{- include "chess.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: app
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.app.port }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.app.port | quote }}
            - name: MONGO_URI
              value: {{ include "chess.mongoUri" . | quote }}
            - name: AUTHOR_URL
              value: {{ .Values.app.env.AUTHOR_URL | quote }}
            - name: FEATURE_GAME_STORAGE
              value: {{ .Values.app.env.FEATURE_GAME_STORAGE | quote }}
            - name: FEATURE_MATERIAL_DIFF
              value: {{ .Values.app.env.FEATURE_MATERIAL_DIFF | quote }}
            - name: FEATURE_OPENING_BOOK
              value: {{ .Values.app.env.FEATURE_OPENING_BOOK | quote }}
            - name: FEATURE_GAME_HISTORY
              value: {{ .Values.app.env.FEATURE_GAME_HISTORY | quote }}
            - name: FEATURE_BOARD_SETTINGS
              value: {{ .Values.app.env.FEATURE_BOARD_SETTINGS | quote }}
            - name: FEATURE_DISCONNECT_CLAIM
              value: {{ .Values.app.env.FEATURE_DISCONNECT_CLAIM | quote }}
            - name: FEATURE_GIVE_TIME
              value: {{ .Values.app.env.FEATURE_GIVE_TIME | quote }}
            - name: FEATURE_DRAW_OFFER
              value: {{ .Values.app.env.FEATURE_DRAW_OFFER | quote }}
            - name: FEATURE_PRIVATE_GAMES
              value: {{ .Values.app.env.FEATURE_PRIVATE_GAMES | quote }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.app.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.app.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}

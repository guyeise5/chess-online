suite: app deployment
templates:
  - templates/app-deployment.yaml
tests:
  - it: should be a Deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should have correct name
    release:
      name: test
    asserts:
      - equal:
          path: metadata.name
          value: test-chess-app

  - it: should have app component label
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: app

  - it: should default to 1 replica
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should respect custom replica count
    set:
      app.replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should use default image
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "guyeise5/chess-app:latest"

  - it: should use custom image
    set:
      app.image.repository: my-registry/chess
      app.image.tag: v2.0.0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "my-registry/chess:v2.0.0"

  - it: should set correct container port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3001

  - it: should set NODE_ENV to production
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_ENV
            value: "production"

  - it: should set PORT as quoted string
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PORT
            value: "3001"

  - it: should set MONGO_URI
    release:
      name: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MONGO_URI
            value: "mongodb://test-chess-mongodb:27017/chess-online"

  - it: should set AUTHOR_URL from values
    set:
      app.env.AUTHOR_URL: "https://example.com"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTHOR_URL
            value: "https://example.com"

  - it: should have default AUTHOR_URL as empty string
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTHOR_URL
            value: ""

  - it: should have default FEATURE_GAME_STORAGE as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_GAME_STORAGE
            value: "true"

  - it: should allow disabling FEATURE_GAME_STORAGE
    set:
      app.env.FEATURE_GAME_STORAGE: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_GAME_STORAGE
            value: "false"

  - it: should have default FEATURE_MATERIAL_DIFF as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_MATERIAL_DIFF
            value: "true"

  - it: should allow disabling FEATURE_MATERIAL_DIFF
    set:
      app.env.FEATURE_MATERIAL_DIFF: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_MATERIAL_DIFF
            value: "false"

  - it: should have default FEATURE_OPENING_BOOK as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_OPENING_BOOK
            value: "true"

  - it: should allow disabling FEATURE_OPENING_BOOK
    set:
      app.env.FEATURE_OPENING_BOOK: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_OPENING_BOOK
            value: "false"

  - it: should have default FEATURE_GAME_HISTORY as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_GAME_HISTORY
            value: "true"

  - it: should allow disabling FEATURE_GAME_HISTORY
    set:
      app.env.FEATURE_GAME_HISTORY: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_GAME_HISTORY
            value: "false"

  - it: should have default FEATURE_BOARD_SETTINGS as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_BOARD_SETTINGS
            value: "true"

  - it: should allow disabling FEATURE_BOARD_SETTINGS
    set:
      app.env.FEATURE_BOARD_SETTINGS: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_BOARD_SETTINGS
            value: "false"

  - it: should have default FEATURE_DISCONNECT_CLAIM as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_DISCONNECT_CLAIM
            value: "true"

  - it: should allow disabling FEATURE_DISCONNECT_CLAIM
    set:
      app.env.FEATURE_DISCONNECT_CLAIM: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_DISCONNECT_CLAIM
            value: "false"

  - it: should have default FEATURE_GIVE_TIME as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_GIVE_TIME
            value: "true"

  - it: should allow disabling FEATURE_GIVE_TIME
    set:
      app.env.FEATURE_GIVE_TIME: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_GIVE_TIME
            value: "false"

  - it: should have default FEATURE_DRAW_OFFER as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_DRAW_OFFER
            value: "true"

  - it: should allow disabling FEATURE_DRAW_OFFER
    set:
      app.env.FEATURE_DRAW_OFFER: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_DRAW_OFFER
            value: "false"

  - it: should have default FEATURE_PRIVATE_GAMES as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_PRIVATE_GAMES
            value: "true"

  - it: should allow disabling FEATURE_PRIVATE_GAMES
    set:
      app.env.FEATURE_PRIVATE_GAMES: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_PRIVATE_GAMES
            value: "false"

  - it: should have default FEATURE_MOVE_SOUND as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_MOVE_SOUND
            value: "true"

  - it: should allow disabling FEATURE_MOVE_SOUND
    set:
      app.env.FEATURE_MOVE_SOUND: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_MOVE_SOUND
            value: "false"

  - it: should have default FEATURE_INTRODUCTION as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_INTRODUCTION
            value: "true"

  - it: should allow disabling FEATURE_INTRODUCTION
    set:
      app.env.FEATURE_INTRODUCTION: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_INTRODUCTION
            value: "false"

  - it: should have default FEATURE_USER_PREFERENCES as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_USER_PREFERENCES
            value: "true"

  - it: should allow disabling FEATURE_USER_PREFERENCES
    set:
      app.env.FEATURE_USER_PREFERENCES: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_USER_PREFERENCES
            value: "false"

  - it: should have default FEATURE_GAME_CHAT as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_GAME_CHAT
            value: "true"

  - it: should allow disabling FEATURE_GAME_CHAT
    set:
      app.env.FEATURE_GAME_CHAT: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_GAME_CHAT
            value: "false"

  - it: should have default FEATURE_ONLINE_PLAYER_COUNT as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_ONLINE_PLAYER_COUNT
            value: "true"

  - it: should allow disabling FEATURE_ONLINE_PLAYER_COUNT
    set:
      app.env.FEATURE_ONLINE_PLAYER_COUNT: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_ONLINE_PLAYER_COUNT
            value: "false"

  - it: should have default FEATURE_MOVE_HISTORY_BROWSE as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_MOVE_HISTORY_BROWSE
            value: "true"

  - it: should allow disabling FEATURE_MOVE_HISTORY_BROWSE
    set:
      app.env.FEATURE_MOVE_HISTORY_BROWSE: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_MOVE_HISTORY_BROWSE
            value: "false"

  - it: should have default FEATURE_STATS as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_STATS
            value: "true"

  - it: should allow disabling FEATURE_STATS
    set:
      app.env.FEATURE_STATS: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_STATS
            value: "false"

  - it: should have default FEATURE_PUZZLE_ANALYSIS as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_PUZZLE_ANALYSIS
            value: "true"

  - it: should allow disabling FEATURE_PUZZLE_ANALYSIS
    set:
      app.env.FEATURE_PUZZLE_ANALYSIS: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_PUZZLE_ANALYSIS
            value: "false"

  - it: should have default FEATURE_CONNECTION_STATUS as true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_CONNECTION_STATUS
            value: "true"

  - it: should allow disabling FEATURE_CONNECTION_STATUS
    set:
      app.env.FEATURE_CONNECTION_STATUS: "false"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_CONNECTION_STATUS
            value: "false"

  - it: should have readiness probe on /readyz
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /readyz
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 3001

  - it: should have liveness probe on /healthz
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /healthz
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 3001

  - it: should set resource limits and requests
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi

  - it: should use imagePullSecrets when set
    set:
      imagePullSecrets:
        - name: my-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: my-secret

  - it: should respect fullnameOverride
    set:
      fullnameOverride: custom-chess
    asserts:
      - equal:
          path: metadata.name
          value: custom-chess-app

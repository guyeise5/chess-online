app:
  replicaCount: 1
  image:
    repository: chess-app
    tag: latest
    pullPolicy: IfNotPresent
  port: 3001
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    AUTHOR_URL: ""
    FEATURE_GAME_STORAGE: "true"
    FEATURE_MATERIAL_DIFF: "true"
    FEATURE_OPENING_BOOK: "true"
    FEATURE_GAME_HISTORY: "true"
    FEATURE_BOARD_SETTINGS: "true"
    FEATURE_DISCONNECT_CLAIM: "true"
    FEATURE_GIVE_TIME: "true"
    FEATURE_DRAW_OFFER: "true"

mongodb:
  image:
    repository: mongo
    tag: "8"
    pullPolicy: IfNotPresent
  port: 27017
  storage:
    size: 10Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

puzzleInit:
  enabled: true
  image:
    repository: chess-puzzle-init
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  backoffLimit: 3

openingInit:
  enabled: true
  image:
    repository: chess-opening-init
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  backoffLimit: 3

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chess.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

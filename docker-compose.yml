services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  puzzle-init:
    build:
      context: .
      dockerfile: Dockerfile.puzzle-init
    environment:
      - MONGO_URI=mongodb://mongo:27017/chess-online
    depends_on:
      - mongo
    restart: "no"

  opening-init:
    build:
      context: .
      dockerfile: Dockerfile.opening-init
    environment:
      - MONGO_URI=mongodb://mongo:27017/chess-online
    depends_on:
      - mongo
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/chess-online
      - PORT=3001
      - AUTHOR_URL=${AUTHOR_URL:-}
      - FEATURE_GAME_STORAGE=${FEATURE_GAME_STORAGE:-true}
      - FEATURE_MATERIAL_DIFF=${FEATURE_MATERIAL_DIFF:-true}
      - FEATURE_OPENING_BOOK=${FEATURE_OPENING_BOOK:-true}
      - FEATURE_GAME_HISTORY=${FEATURE_GAME_HISTORY:-true}
      - FEATURE_BOARD_SETTINGS=${FEATURE_BOARD_SETTINGS:-true}
      - FEATURE_DISCONNECT_CLAIM=${FEATURE_DISCONNECT_CLAIM:-true}
      - FEATURE_GIVE_TIME=${FEATURE_GIVE_TIME:-true}
      - FEATURE_DRAW_OFFER=${FEATURE_DRAW_OFFER:-true}
      - FEATURE_PRIVATE_GAMES=${FEATURE_PRIVATE_GAMES:-true}
      - FEATURE_MOVE_SOUND=${FEATURE_MOVE_SOUND:-true}
      - FEATURE_INTRODUCTION=${FEATURE_INTRODUCTION:-true}
      - FEATURE_USER_PREFERENCES=${FEATURE_USER_PREFERENCES:-true}
      - FEATURE_GAME_CHAT=${FEATURE_GAME_CHAT:-true}
      - FEATURE_ONLINE_PLAYER_COUNT=${FEATURE_ONLINE_PLAYER_COUNT:-true}
      - FEATURE_MOVE_HISTORY_BROWSE=${FEATURE_MOVE_HISTORY_BROWSE:-true}
      - FEATURE_STATS=${FEATURE_STATS:-true}
      - FEATURE_PUZZLE_ANALYSIS=${FEATURE_PUZZLE_ANALYSIS:-true}
      - FEATURE_CONNECTION_STATUS=${FEATURE_CONNECTION_STATUS:-true}
      - FEATURE_SAML_AUTH=${FEATURE_SAML_AUTH:-false}
      - SAML_ENTRY_POINT=${SAML_ENTRY_POINT:-http://localhost:8080/simplesaml/saml2/idp/SSOService.php}
      - SAML_ISSUER=${SAML_ISSUER:-chess-online}
      - SAML_CALLBACK_URL=${SAML_CALLBACK_URL:-http://localhost:3001/auth/callback}
      - SAML_IDP_CERT=${SAML_IDP_CERT:-}
      - SAML_USER_ID_FIELD=${SAML_USER_ID_FIELD:-uid}
      - SAML_FIRST_NAME_FIELD=${SAML_FIRST_NAME_FIELD:-cn}
      - SAML_LAST_NAME_FIELD=${SAML_LAST_NAME_FIELD:-sn}
      - SAML_WANT_RESPONSE_SIGNED=${SAML_WANT_RESPONSE_SIGNED:-false}
      - SESSION_SECRET=${SESSION_SECRET:-chess-session-secret}
    depends_on:
      - mongo

  saml-idp:
    image: kristophjunge/test-saml-idp
    ports:
      - "8080:8080"
    volumes:
      - ./saml-idp/authsources.php:/var/www/simplesamlphp/config/authsources.php
    environment:
      - SIMPLESAMLPHP_SP_ENTITY_ID=chess-online
      - SIMPLESAMLPHP_SP_ASSERTION_CONSUMER_SERVICE=http://localhost:3001/auth/callback

volumes:
  mongo-data:

services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  puzzle-init:
    build:
      context: .
      dockerfile: Dockerfile.puzzle-init
    environment:
      - MONGO_URI=mongodb://mongo:27017/chess-online
    depends_on:
      - mongo
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/chess-online
      - PORT=3001
      - AUTHOR_URL=${AUTHOR_URL:-}
      - FEATURE_GAME_STORAGE=${FEATURE_GAME_STORAGE:-true}
    depends_on:
      - mongo

volumes:
  mongo-data:
